<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy P2P Trading System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <main class="login-card">
    <section class="box">
      <h2>Energy P2P Trading System</h2>
      <p class="muted">A simple DBMS project using Oracle PL/SQL for energy listing, buying and wallet update.</p>

      <form id="loginForm">
        <label>
          Email
          <input id="loginEmail" type="email" value="producer@energy.com" required>
        </label>
        <label>
          Password
          <input id="loginPassword" type="password" value="1234" required>
        </label>
        <button type="submit">Login</button>
      </form>

      <div class="row" style="margin-top: 10px;">
        <button class="secondary" data-login="producer@energy.com" type="button">Producer</button>
        <button class="secondary" data-login="consumer@energy.com" type="button">Consumer</button>
        <button class="secondary" data-login="admin@energy.com" type="button">Admin</button>
      </div>
      <p id="loginMessage" class="message"></p>
    </section>

    <section class="box">
      <h2>Register User</h2>
      <p class="notice">New users are stored with status PENDING. Admin approval is required before trading.</p>
      <form id="registerForm">
        <label>
          Name
          <input id="registerName" type="text" required>
        </label>
        <label>
          Email
          <input id="registerEmail" type="email" required>
        </label>
        <label>
          Password
          <input id="registerPassword" type="password" required>
        </label>
        <label>
          Role
          <select id="registerRole">
            <option value="PRODUCER">Producer</option>
            <option value="CONSUMER">Consumer</option>
          </select>
        </label>
        <label>
          Grid Zone
          <input id="registerZone" type="text" value="North Zone">
        </label>
        <button type="submit">Register</button>
      </form>
      <p id="registerMessage" class="message"></p>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
